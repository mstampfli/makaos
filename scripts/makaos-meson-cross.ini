# MakaOS meson cross-compile file.
# Used by `meson setup --cross-file scripts/makaos-meson-cross.ini <builddir>`.
# Pkg-config sysroot is set via PKG_CONFIG_* env vars at invocation time
# because meson's built-in sys_root handling collides with our sysroot
# being mutable across builds.

[binaries]
c        = '/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/toolchain/bin/x86_64-pc-makaos-gcc'
cpp      = '/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/toolchain/bin/x86_64-pc-makaos-g++'
ar       = '/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/toolchain/bin/x86_64-pc-makaos-ar'
strip    = '/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/toolchain/bin/x86_64-pc-makaos-strip'
pkg-config = 'pkg-config'

[host_machine]
system     = 'makaos'
cpu_family = 'x86_64'
cpu        = 'x86_64'
endian     = 'little'

[properties]
needs_exe_wrapper = true
sys_root          = '/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/build/sysroot'

[built-in options]
c_args      = ['--sysroot=/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/build/sysroot', '-nostdinc', '-I/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/build/sysroot/usr/include', '-I/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/toolchain/lib/gcc/x86_64-pc-makaos/14.2.0/include']
cpp_args    = ['--sysroot=/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/build/sysroot', '-nostdinc', '-I/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/build/sysroot/usr/include', '-I/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/toolchain/lib/gcc/x86_64-pc-makaos/14.2.0/include']
c_link_args = ['--sysroot=/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/build/sysroot']
cpp_link_args = ['--sysroot=/home/parrot/Documents/dev/newMakaOS/bootloader-kernel-in-NASM/build/sysroot']
